name: 🔧 Build Obfuscate BPB Panel

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 1 * * *'  # 每天凌晨1点自动运行
  workflow_dispatch:     # 添加手动触发选项

env:
  NODE_VERSION: 'latest'    
  OUTPUT_FILE: '_worker.js'
  SOURCE_FILE: 'origin.js'
  REPO: 'bia-pain-bache/BPB-Worker-Panel'  # 上游仓库地址

permissions:
  contents: write

jobs:
  build-and-obfuscate:
    name: 🛠️ 构建和混淆 Worker
    runs-on: ubuntu-latest
    
    steps:
      # 第一步：准备环境
      - name: 📥 检出代码仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: ⚙️ 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 第二步：安装必要工具
      - name: 🛠️ 安装系统工具
        run: |
          echo "安装必要的系统工具..."
          sudo apt-get update
          sudo apt-get install -y jq curl wget
          echo "✅ 系统工具安装完成"

      - name: 🔧 安装 JavaScript 混淆工具
        run: |
          echo "开始安装 javascript-obfuscator..."
          max_retries=3
          for i in $(seq 1 $max_retries); do
            echo "尝试安装 (第 $i/$max_retries 次)..."
            if npm install -g javascript-obfuscator; then
              echo "✅ javascript-obfuscator 安装成功"
              break
            else
              echo "❌ 安装失败，5秒后重试..."
              sleep 5
            fi
            if [ $i -eq $max_retries ]; then
              echo "❌ 所有重试次数已用完，安装失败"
              exit 1
            fi
          done
          javascript-obfuscator --version

      # 第三步：获取源文件 + 提取完整版本信息
      - name: 🌐 获取最新 Worker 文件
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔄 正在从仓库 $REPO 获取最新发布版本..."
          
          # 获取完整的 Release 信息
          RELEASE_INFO=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/latest")
          
          if [ $? -ne 0 ]; then
            echo "❌ 获取发布信息失败"
            exit 1
          fi
          
          # 精准提取版本核心信息（匹配你提供的 API 返回结构）
          RELEASE_TAG=$(echo "$RELEASE_INFO" | jq -r '.tag_name')          # v4.1.3
          RELEASE_NAME=$(echo "$RELEASE_INFO" | jq -r '.name')            # Release v4.1.3
          RELEASE_CREATED_AT=$(echo "$RELEASE_INFO" | jq -r '.created_at')# 2026-02-10T15:16:07Z
          RELEASE_PUBLISHED_AT=$(echo "$RELEASE_INFO" | jq -r '.published_at') # 2026-02-19T12:23:44Z
          RELEASE_ASSET_ID=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name == "worker.js") | .id') # 378582495
          
          # 验证版本信息是否有效
          if [ "$RELEASE_TAG" = "null" ] || [ -z "$RELEASE_TAG" ]; then
            echo "❌ 无法获取有效的版本号 (tag_name)"
            exit 1
          fi
          
          # 将版本信息写入环境变量（供后续步骤使用）
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV
          echo "RELEASE_NAME=$RELEASE_NAME" >> $GITHUB_ENV
          echo "RELEASE_CREATED_AT=$RELEASE_CREATED_AT" >> $GITHUB_ENV
          echo "RELEASE_PUBLISHED_AT=$RELEASE_PUBLISHED_AT" >> $GITHUB_ENV
          echo "RELEASE_ASSET_ID=$RELEASE_ASSET_ID" >> $GITHUB_ENV
          
          # 打印清晰的版本信息
          echo "🎯 提取到的版本信息："
          echo "   ├─ 版本号 (tag): $RELEASE_TAG"
          echo "   ├─ 版本名称: $RELEASE_NAME"
          echo "   ├─ 创建时间: $RELEASE_CREATED_AT"
          echo "   ├─ 发布时间: $RELEASE_PUBLISHED_AT"
          echo "   └─ Worker 文件ID: $RELEASE_ASSET_ID"
          
          # 查找 worker.js 下载链接
          DOWNLOAD_URL=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name == "worker.js") | .browser_download_url')
          
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "❌ 错误: 在最新发布中找不到 worker.js 文件"
            exit 1
          fi
          
          # 下载文件
          echo "📥 下载 Worker 文件: $DOWNLOAD_URL"
          wget -O "$SOURCE_FILE" "$DOWNLOAD_URL"
          
          # 验证文件
          if [ ! -f "$SOURCE_FILE" ] || [ ! -s "$SOURCE_FILE" ]; then
            echo "❌ 错误: 文件下载失败或为空"
            exit 1
          fi
          
          echo "✅ 文件下载成功，大小: $(du -h "$SOURCE_FILE" | cut -f1)"

      # 第四步：代码混淆
      - name: 🛡️ 混淆 Worker 代码
        run: |
          echo "🛡️ 开始混淆 $RELEASE_TAG 版本的代码..."
          
          # 执行混淆
          javascript-obfuscator "$SOURCE_FILE" \
            --output "$OUTPUT_FILE" \
            --compact true \
            --identifier-names-generator hexadecimal \
            --string-array true \
            --string-array-threshold 0.5 \
            --simplify true
          
          if [ $? -ne 0 ] || [ ! -f "$OUTPUT_FILE" ]; then
            echo "❌ 混淆处理失败"
            exit 1
          fi
          
          # 计算文件大小并写入环境变量
          FILE_SIZE=$(stat -c %s "$OUTPUT_FILE" 2>/dev/null || stat -f %z "$OUTPUT_FILE")
          FILE_SIZE_KB=$((FILE_SIZE/1024))
          echo "FILE_SIZE=$FILE_SIZE" >> $GITHUB_ENV
          echo "FILE_SIZE_KB=$FILE_SIZE_KB" >> $GITHUB_ENV
          
          echo "✅ 混淆完成，输出文件大小: $FILE_SIZE_KB KB"

      # 第五步：提交更改（标题直接显示版本号）
      - name: ✅ 提交混淆结果
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: main
          commit_message: |
            :arrow_up: chore: 自动更新 BPB Panel 至 ${{ env.RELEASE_TAG }}
            
            核心版本信息：
            - 上游版本号: ${{ env.RELEASE_TAG }}
            - 版本名称: ${{ env.RELEASE_NAME }}
            - 发布时间: ${{ env.RELEASE_PUBLISHED_AT }}
            - Worker 文件ID: ${{ env.RELEASE_ASSET_ID }}
            
            构建信息：
            - 源文件: ${{ env.SOURCE_FILE }}
            - 混淆文件: ${{ env.OUTPUT_FILE }}
            - 输出文件大小: ${{ env.FILE_SIZE_KB }} KB (${{ env.FILE_SIZE }} 字节)
          commit_author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
          commit_user_email: 'actions@github.com'
          skip_fetch: true

      # 第六步：完成通知
      - name: 🎉 构建完成总结
        run: |
          echo "========================================"
          echo "🎉 BPB Panel ${{ env.RELEASE_TAG }} 构建完成!"
          echo "========================================"
          echo "📌 核心版本信息:"
          echo "   版本号: ${{ env.RELEASE_TAG }}"
          echo "   版本名称: ${{ env.RELEASE_NAME }}"
          echo "   发布时间: ${{ env.RELEASE_PUBLISHED_AT }}"
          echo "📁 文件信息:"
          echo "   混淆文件: ${{ env.OUTPUT_FILE }}"
          echo "   文件大小: ${{ env.FILE_SIZE_KB }} KB"
          echo "🕒 完成时间: $(date)"
          echo "========================================"
