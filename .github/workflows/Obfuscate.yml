```yaml
name: 🔧 Build Obfuscate BPB Panel

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  OUTPUT_FILE: '_worker.js'
  SOURCE_FILE: 'origin.js'

permissions:
  contents: write

jobs:
  build-and-obfuscate:
    name: 🛠️ 构建和混淆 Worker
    runs-on: ubuntu-latest
    
    steps:
      # 1️⃣ 检出仓库
      - name: 📥 检出代码仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: ⚙️ 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 2️⃣ 安装工具
      - name: 🛠️ 安装系统工具
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl wget

      - name: 🔧 安装混淆器
        run: |
          npm install -g javascript-obfuscator
          javascript-obfuscator --version

      # 3️⃣ 获取最新 release
      - name: 🌐 获取最新 Worker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: 'bia-pain-bache/BPB-Worker-Panel'
        run: |
          echo "获取最新 release..."

          RELEASE_INFO=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/latest")

          RELEASE_TAG=$(echo "$RELEASE_INFO" | jq -r '.tag_name')
          RELEASE_NAME=$(echo "$RELEASE_INFO" | jq -r '.name')

          echo "版本: $RELEASE_NAME ($RELEASE_TAG)"

          # ✅ 保存变量
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV

          DOWNLOAD_URL=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name=="worker.js") | .browser_download_url')

          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "未找到 worker.js"
            exit 1
          fi

          wget -O "$SOURCE_FILE" "$DOWNLOAD_URL"

          test -s "$SOURCE_FILE" || (echo "下载失败" && exit 1)

      # 4️⃣ 混淆
      - name: 🛡️ 混淆代码
        run: |
          javascript-obfuscator "$SOURCE_FILE" \
            --output "$OUTPUT_FILE" \
            --compact true \
            --identifier-names-generator hexadecimal \
            --string-array true \
            --string-array-threshold 0.5 \
            --simplify true

          test -f "$OUTPUT_FILE" || (echo "混淆失败" && exit 1)

          FILE_SIZE=$(stat -c %s "$OUTPUT_FILE" 2>/dev/null || stat -f %z "$OUTPUT_FILE")
          FILE_SIZE_KB=$((FILE_SIZE/1024))

          echo "文件大小: ${FILE_SIZE_KB} KB"

          # ✅ 保存变量
          echo "FILE_SIZE_KB=$FILE_SIZE_KB" >> $GITHUB_ENV

      # 5️⃣ 提交
      - name: 📝 提交文件
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "github-actions[bot]"

          git add "$SOURCE_FILE" "$OUTPUT_FILE"

          # ✅ 防止空提交
          if git diff --cached --quiet; then
            echo "没有变化，跳过提交"
            exit 0
          fi

      - name: ✅ 自动提交
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: main
          commit_message: |
            :arrow_up: chore: 自动更新 BPB Panel v${{ env.RELEASE_TAG }}
            
            - 源文件: ${{ env.SOURCE_FILE }}
            - 混淆文件: ${{ env.OUTPUT_FILE }}
            - 大小: ${{ env.FILE_SIZE_KB }} KB
            - 版本: v${{ env.RELEASE_TAG }}
          commit_author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
          skip_fetch: true

      # 6️⃣ 输出日志
      - name: 🎉 完成
        run: |
          echo "完成"
          echo "版本: $RELEASE_TAG"
          echo "大小: $FILE_SIZE_KB KB"
```
